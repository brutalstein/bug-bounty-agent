project:
  name: "bug-bounty-agent"
  mode: "authorized"
  description: "Authorized bug bounty automation assistant"

active_profile: "airtable-staging-public-h1"

profiles:
  owasp-juice-shop-local:
    target_profile:
      name: "owasp-juice-shop-local"
      type: "training-lab"
      base_url: "http://localhost:3000"

    scope:
      allowed_hosts:
        - "localhost"
        - "127.0.0.1"

      allowed_url_patterns:
        - "http://localhost:3000/*"
        - "http://127.0.0.1:3000/*"

      blocked_hosts: []

      blocked_path_prefixes:
        - "/logout"
        - "/basket"
        - "/checkout"
        - "/payment"
        - "/admin"

    rules:
      max_requests_per_minute: 60
      allow_subdomain_scan: false
      allow_port_scan: false
      allow_active_scan: true
      allow_browser_crawl: true
      require_scope_check: true
      save_all_outputs: true

    safety:
      stop_on_scope_violation: true
      stop_on_high_error_rate: true
      destructive_actions_allowed: false

    authorization:
      kind: "local_lab"
      confirmed: true
      evidence: "Local OWASP Juice Shop lab started by the operator."

    policy:
      program_name: "OWASP Juice Shop Local Lab"
      program_url: "https://owasp.org/www-project-juice-shop/"
      policy_reviewed_at: "2026-06-27"
      policy_max_age_days: 365
      interpretation_mode: "lab_flexible"
      allow_automated_readonly_recon: true
      require_explicit_allow_for_risky_actions: false
      allowed_http_methods:
        - "GET"
        - "HEAD"
        - "OPTIONS"
        - "POST"
      requires_manual_approval_for:
        - "authenticated_crawl"
        - "browser_screenshots"
        - "active_validation"
        - "state_changing_requests"
      disallowed_actions:
        - "unauthorized_scanning"
        - "destructive_actions"
        - "credential_attacks"
        - "brute_force"
        - "denial_of_service"
        - "automatic_submission"
      notes:
        - "Initial real test target is OWASP Juice Shop running locally."
        - "Never scan assets outside allowed_hosts and allowed_url_patterns."
        - "Later profiles can be added for PortSwigger labs and real bug bounty scopes."
        - "POST is allowed here only for explicit, manual-approval authenticated lab session bootstrap."
      priority_categories: []
      deprioritized_categories: []
      core_ineligible_findings: []
      focus_areas: []
      operator_recipes: []

    capabilities:
      passive_recon: true
      high_value_route_discovery: true
      endpoint_validation: true
      js_analysis: true
      browser_readonly_compare: true
      authenticated_owned_account_diff: true
      api_schema_discovery: true
      graphql_introspection_check: true
      safe_parameter_reflection_check: true
      safe_cache_behavior_check: true
      safe_cors_behavior_check: true
      safe_redirect_behavior_check: true
      safe_idor_candidate_mapping: true
      active_scan: true
      port_scan: false
      state_changing_requests: false
      automatic_submission: false

    session_profiles:
      juice-shop-customer:
        kind: "juice_shop_jwt"
        login_url: "http://localhost:3000/rest/user/login"
        username_field: "email"
        password_field: "password"
        username_default: "mc.safesearch@juice-sh.op"
        password_default: "Mr. N00dles"
        username_env: "BB_JUICE_SHOP_USER_EMAIL"
        password_env: "BB_JUICE_SHOP_USER_PASSWORD"
        token_json_path: "authentication.token"
        auth_header_name: "Authorization"
        auth_header_prefix: "Bearer"
        role_hint: "customer"
        notes:
          - "Local lab-only seeded customer account."
          - "Override with environment variables for custom lab credentials."

    lab:
      docker_image: "bkimminich/juice-shop"
      container_name: "bb-juice"
      published_port: 3000
      container_port: 3000

  airtable-staging-public-h1:
    target_profile:
      name: "airtable-staging-public-h1"
      type: "bug-bounty-program"
      base_url: "https://staging.airtable.com"

    scope:
      allowed_hosts:
        - "staging.airtable.com"
        - "www.staging.airtable.com"
        - "api-staging.airtable.com"
        - "mcp.staging.airtable.com"
        - "static.staging.airtable.com"

      allowed_url_patterns:
        - "https://staging.airtable.com/*"
        - "https://www.staging.airtable.com/*"
        - "https://api-staging.airtable.com/*"
        - "https://mcp.staging.airtable.com/*"
        - "https://static.staging.airtable.com/*"

      blocked_hosts: []

      blocked_path_prefixes: []

    rules:
      max_requests_per_minute: 10
      allow_subdomain_scan: false
      allow_port_scan: false
      allow_active_scan: false
      allow_browser_crawl: true
      require_scope_check: true
      save_all_outputs: true

    safety:
      stop_on_scope_violation: true
      stop_on_high_error_rate: true
      destructive_actions_allowed: false

    authorization:
      kind: "public_bug_bounty_policy"
      confirmed: true
      evidence: "Official Airtable security.txt points to HackerOne policy. Airtable HackerOne scope page reviewed on June 25, 2026 lists staging.airtable.com, api-staging.airtable.com, mcp.staging.airtable.com, airtable.js, and the Airtable MCP CLI in scope. This profile remains limited to low-rate, read-only probing."

    policy:
      program_name: "Airtable HackerOne Bug Bounty"
      program_url: "https://hackerone.com/airtable"
      policy_reviewed_at: "2026-06-25"
      policy_max_age_days: 30
      interpretation_mode: "permissive_readonly_explicit_risky"
      allow_automated_readonly_recon: true
      require_explicit_allow_for_risky_actions: true
      allowed_http_methods:
        - "GET"
        - "HEAD"
        - "OPTIONS"
      requires_manual_approval_for:
        - "authenticated_crawl"
        - "browser_screenshots"
        - "active_validation"
        - "state_changing_requests"
      disallowed_actions:
        - "unauthorized_scanning"
        - "destructive_actions"
        - "credential_attacks"
        - "brute_force"
        - "denial_of_service"
        - "automatic_submission"
      notes:
        - "Official Airtable security.txt references the public HackerOne bug bounty program."
        - "Airtable HackerOne scope page reviewed on June 25, 2026 lists staging.airtable.com, api-staging.airtable.com, mcp.staging.airtable.com, airtable.js, @airtable/mcp-cli, and wildcard *.staging.airtable.com in scope."
        - "The same scope page explicitly warns not to test production airtable.com and to use endpointUrl https://api-staging.airtable.com for API testing."
        - "Passive low-rate read-only automation is allowed here as an operator policy interpretation because the program guidance does not forbid safe scanner-assisted recon, but raw scanner output alone is not treated as a valid report."
        - "Only explicitly listed hosts from the wildcard family are enabled here; no wildcard host enumeration, no active scan, and no port scan are enabled."
        - "Read-only browser evidence and browser-based public-surface comparison are allowed only with explicit manual approval."
      priority_categories:
        - "potential_auth_bypass"
        - "potential_unauthenticated_admin_access"
        - "potential_unauthenticated_api_data_exposure"
        - "potential_sensitive_exposure"
        - "idor_candidate"
        - "validated_admin_surface"
        - "validated_user_data_surface"
        - "cross_host_session_bootstrap_review"
        - "anonymous_session_bootstrap_review"
        - "cross_surface_session_bootstrap_review"
        - "browser_session_bootstrap_review"
        - "browser_storage_policy_review"
        - "authentication_flow_review"
        - "validated_authentication_surface"
        - "validated_api_surface"
        - "public_api_schema_review"
        - "graphql_surface_review"
        - "auth_surface_cache_policy_review"
        - "session_cache_key_review"
        - "api_surface_cache_review"
      deprioritized_categories:
        - "cookie_attribute_policy_review"
        - "session_cookie_policy_review"
        - "public_route_inventory_review"
        - "reachable_api_mapping"
      core_ineligible_findings:
        - "missing_cookie_flags_without_impact"
        - "permissive_cors_without_impact"
        - "open_redirect_without_additional_impact"
        - "clickjacking_without_sensitive_action"
        - "software_version_disclosure_only"
        - "rate_limiting_without_clear_security_impact"
      focus_areas:
        - id: "tenant-data-and-access-boundaries"
          title: "Tenant, object, and privileged API boundaries"
          objective: "Prioritize anonymous or cross-surface access to object, workspace, metadata, and privileged API routes where broken access control or data exposure would be bounty-relevant."
          categories:
            - "potential_auth_bypass"
            - "potential_unauthenticated_admin_access"
            - "potential_unauthenticated_api_data_exposure"
            - "potential_sensitive_exposure"
            - "idor_candidate"
            - "validated_api_surface"
            - "authenticated_access_boundary_review"
            - "authenticated_sensitive_response_review"
          path_keywords:
            - "/api/"
            - "/graphql"
            - "/session"
            - "/auth"
            - "/internal/"
            - "/meta"
            - "/base"
            - "/workspace"
            - "/record"
            - "/share"
          commands:
            - "python app/main.py surface-recon --profile {profile_name} {base_url} https://api-staging.airtable.com {base_url}/login {base_url}/developers/web/api/introduction"
            - "python app/main.py session-compare-run --manual-approval --session-profile airtable-staging-api-key runs/<run-dir>"
          notes:
            - "Favor object-level access control, anonymous versus authenticated drift, and cross-surface metadata exposure over generic hardening issues."
            - "Do not enumerate other users, bases, or records. Restrict any later validation to self-owned staging data with explicit manual approval."
        - id: "anonymous-auth-boundary"
          title: "Anonymous auth bootstrap and session boundary drift"
          objective: "Prioritize public routes that set auth-like cookies, change browser storage, or behave differently across hosts before login."
          categories:
            - "cross_host_session_bootstrap_review"
            - "anonymous_session_bootstrap_review"
            - "browser_session_bootstrap_review"
            - "browser_storage_policy_review"
          path_keywords:
            - "/login"
            - "/account"
            - "/session"
            - "/auth"
            - "/internal/"
          commands:
            - "python app/main.py surface-recon --profile {profile_name} {base_url} {base_url}/login {base_url}/developers/web/api/introduction"
            - "python app/main.py browser-surface-compare --profile {profile_name} --manual-approval {base_url} {base_url}/login {base_url}/developers/web/api/introduction"
          notes:
            - "Treat missing Secure or HttpOnly flags alone as low value unless they support a stronger boundary issue."
            - "Favor cross-host, cross-surface, and storage or cookie provenance differences over single-response hardening issues."
        - id: "developer-and-api-surface"
          title: "Developer, API, and internal discovery surfaces"
          objective: "Harvest safe high-value routes from public developer assets and compare anonymous versus authenticated visibility later with self-owned test data."
          categories:
            - "validated_api_surface"
            - "public_api_schema_review"
            - "graphql_surface_review"
            - "authentication_flow_review"
          path_keywords:
            - "/developers"
            - "/api"
            - "/graphql"
            - "/openapi"
            - "/swagger"
            - "/internal/"
          commands:
            - "python app/main.py surface-recon --profile {profile_name} {base_url} {base_url}/login {base_url}/developers/web/api/introduction"
            - "python app/main.py authenticated-crawl --profile {profile_name} --session-profile airtable-staging-api-key --manual-approval {base_url}"
            - "python app/main.py session-compare --manual-approval --session-profile airtable-staging-api-key runs/<run-dir>"
          notes:
            - "Keep authenticated checks limited to your own staging account, your own token, and self-owned test data."
            - "Public route inventory alone is not a bounty; use it to drive endpoint validation and later auth-diff analysis."
      operator_recipes:
        - id: "airtable-passive-first-pass"
          name: "Passive first pass"
          goal: "Build the first high-signal anonymous surface map."
          when: "New staging route set or after profile or routing changes."
          command: "python app/main.py surface-recon --profile {profile_name} {base_url} {base_url}/login {base_url}/developers/web/api/introduction"
          notes:
            - "Review program_lens.md, high_value_route_candidates.md, review_queue.md, and evidence_pack.md together."
        - id: "airtable-browser-boundary-check"
          name: "Browser boundary check"
          goal: "Compare read-only cookie and storage behavior on key public surfaces."
          when: "When HTTP-only passive recon shows auth-like cookies or cross-host redirects."
          command: "python app/main.py browser-surface-compare --profile {profile_name} --manual-approval {base_url} {base_url}/login {base_url}/developers/web/api/introduction"
          notes:
            - "Stay read-only and do not tamper with cookies or tokens."
        - id: "airtable-owned-account-diff"
          name: "Owned-account auth diff"
          goal: "Compare anonymous and authenticated visibility with self-owned staging credentials."
          when: "Only after strong anonymous signals and explicit manual approval."
          command: "python app/main.py authenticated-crawl --profile {profile_name} --session-profile airtable-staging-api-key --manual-approval {base_url}"
          notes:
            - "Use endpointUrl https://api-staging.airtable.com for later API-focused work."
            - "Avoid touching production data or any state-changing workflows."

    capabilities:
      passive_recon: true
      high_value_route_discovery: true
      endpoint_validation: true
      js_analysis: true
      browser_readonly_compare: false
      authenticated_owned_account_diff: false
      api_schema_discovery: true
      graphql_introspection_check: true
      safe_parameter_reflection_check: true
      safe_cache_behavior_check: true
      safe_cors_behavior_check: true
      safe_redirect_behavior_check: true
      safe_idor_candidate_mapping: true
      active_scan: false
      port_scan: false
      state_changing_requests: false
      automatic_submission: false

    session_profiles:
      airtable-staging-api-key:
        kind: "static_bearer_token"
        login_url: "https://staging.airtable.com/account"
        username_default: "staging-api-key-operator"
        username_env: "BB_AIRTABLE_STAGING_ACCOUNT_EMAIL"
        token_env: "BB_AIRTABLE_STAGING_API_KEY"
        auth_header_name: "Authorization"
        auth_header_prefix: "Bearer"
        role_hint: "api_key"
        probe_urls:
          - "https://api-staging.airtable.com/v0/meta/bases"
        notes:
          - "Generate the API key from your own authorized staging account at https://staging.airtable.com/account."
          - "Use endpointUrl https://api-staging.airtable.com when testing Airtable Web API clients."
          - "Read-only probe seed inferred from the official Airtable Web API `GET /v0/meta/bases` documentation and adapted to the in-scope staging endpointUrl."
          - "Only run read-only requests with self-owned test data and explicit manual approval."
